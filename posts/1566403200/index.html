    <h1 class="article-title">输入密码才能浏览网页内容的JS代码</h1>

   <div class="post-meta">

  <div class="post-content">
    <h1 id="输入密码才能浏览网页内容的JS代码"><a href="#输入密码才能浏览网页内容的JS代码" class="headerlink" title="输入密码才能浏览网页内容的JS代码"></a>输入密码才能浏览网页内容的JS代码</h1><p>代码一：<br><figure class="highlight plain"><figcaption><span>type</span></figcaption><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br></pre></td><td class="code"><pre><span class="line">function password() &#123;   </span><br><span class="line">var testV = 1;   </span><br><span class="line">var pass1 = prompt(&apos;请输入密码&apos;,&apos;&apos;);   </span><br><span class="line">while (testV &lt; 3) &#123;   </span><br><span class="line">if (!pass1)   </span><br><span class="line">history.go(-1);   </span><br><span class="line">if (pass1 == &quot;123&quot;) &#123;//初始密码123   </span><br><span class="line">alert(&apos;密码正确!&apos;);   </span><br><span class="line">break;   </span><br><span class="line">&#125;   </span><br><span class="line">testV+=1;   </span><br><span class="line">var pass1 =   </span><br><span class="line">prompt(&apos;密码错误!请重新输入:&apos;);   </span><br><span class="line">&#125;   </span><br><span class="line">if (pass1!=&quot;password&quot; &amp; testV ==3)   </span><br><span class="line">history.go(-1);   </span><br><span class="line">return &quot; &quot;;   </span><br><span class="line">&#125;   </span><br><span class="line">document.write(password());   </span><br><span class="line">&lt;/script&gt;</span><br></pre></td></tr></table></figure></p>
<p>代码二：<br><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br></pre></td><td class="code"><pre><span class="line">&lt;script type=&quot;text/javascript&quot;&gt;   </span><br><span class="line">function password() &#123;   </span><br><span class="line">var testV = 1;   </span><br><span class="line">var pass1 = prompt(&apos;Sorry,该页只限熟人浏览,请输入密码:&apos;,&apos;&apos;);   </span><br><span class="line">while (testV &lt; 3) &#123;   </span><br><span class="line">if (!pass1)    </span><br><span class="line">history.go(-1);   </span><br><span class="line">if (pass1 == &quot;123&quot;) &#123;//初始密码123   </span><br><span class="line">alert(&apos;一看你就是自己人，口令正确!&apos;);   </span><br><span class="line">window.location.href=&quot;http://www.aeink.com&quot;;//修改需要密码认证的网页   </span><br><span class="line">break;   </span><br><span class="line">&#125;    </span><br><span class="line">testV+=1;   </span><br><span class="line">var pass1 =    </span><br><span class="line">prompt(&apos;朋友，密码不对！:(&apos;,&apos;&apos;);   </span><br><span class="line">&#125;   </span><br><span class="line">if (pass1!=&quot;password&quot; &amp; testV ==3)    </span><br><span class="line">history.go(-1);   </span><br><span class="line">return &quot; &quot;;   </span><br><span class="line">&#125;    </span><br><span class="line">document.write(password());   </span><br><span class="line">&lt;/script&gt;</span><br></pre></td></tr></table></figure></p>
<p>代码三：<br><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br></pre></td><td class="code"><pre><span class="line">&lt;script type=&quot;text/javascript&quot;&gt;   </span><br><span class="line">loopy()   </span><br><span class="line">function loopy() &#123;   </span><br><span class="line">var sWord =&quot;&quot;  </span><br><span class="line">while (sWord != &quot;123&quot;) &#123;//初始密码123   </span><br><span class="line">sWord = prompt(&quot;输入正确密码才能登陆!&quot;)   </span><br><span class="line">&#125;   </span><br><span class="line">alert(&quot;AH…欢迎光临！&quot;)   </span><br><span class="line">&#125;   </span><br><span class="line">&lt;/script&gt;</span><br></pre></td></tr></table></figure></p>
<p>把上述代码加到网页头部模版 /head 标签前即可.</p>
<h1 id="不错的防止别人查看页面的代码-用来保护网站版权"><a href="#不错的防止别人查看页面的代码-用来保护网站版权" class="headerlink" title="不错的防止别人查看页面的代码,用来保护网站版权"></a>不错的防止别人查看页面的代码,用来保护网站版权</h1><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br></pre></td><td class="code"><pre><span class="line">&lt;!--onselectstart:禁止选中 oncontextmenu:右键弹出版权 event.keyCode==27:按esc键表示放弃Esc键阻止网页继续载入,也就是说你按ESC键网页还是继续加载--&gt;</span><br><span class="line">&lt;body onselectstart=&quot;return false;&quot; oncontextmenu=&quot;alert(&apos;请尊重本网站版权！&apos;);return false;&quot; onkeydown=&quot;if(event.keyCode==27) return false;&quot;&gt;</span><br><span class="line">&lt;script type=&quot;text/javascript&quot;&gt;</span><br><span class="line">document.onmousedown = click;  //绑定禁用鼠标右键事件</span><br><span class="line">document.onkeydown = ctrl_key; //绑定禁用键盘事件</span><br><span class="line">function click() &#123;</span><br><span class="line">if (event.button == 2)      //单击的鼠标键为右键</span><br><span class="line">&#123;</span><br><span class="line">alert(&apos;请尊重本网站版权！&apos;);</span><br><span class="line">return false;</span><br><span class="line">&#125;</span><br><span class="line">&#125;</span><br><span class="line">function ctrl_key() &#123;</span><br><span class="line">if (event.keyCode == 17) &#123;                          //禁用CTRL+S 保存网页代码</span><br><span class="line">window.alert(&quot;请尊重本网站版权！&quot;);</span><br><span class="line">return false;</span><br><span class="line">&#125;</span><br><span class="line">if (event.keyCode == 123) &#123;                         //禁用F12查看源代码</span><br><span class="line">alert(&apos;请尊重本网站版权！&apos;);</span><br><span class="line">return false;</span><br><span class="line">&#125;</span><br><span class="line">&#125;</span><br><span class="line">&lt;/script&gt;</span><br></pre></td></tr></table></figure>
