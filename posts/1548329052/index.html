">   &lt;/div&gt;</span><br><span class="line"></span><br><span class="line">   &lt;!--聊天室名字--&gt;</span><br><span class="line"></span><br><span class="line">   &lt;!--聊天室消息框--&gt;</span><br><span class="line"></span><br><span class="line">   &lt;div class=&quot;panel-body &quot;&gt;</span><br><span class="line"></span><br><span class="line">    &lt;div class=&quot;well no-bottom &quot;&gt;</span><br><span class="line"></span><br><span class="line">     &lt;!--     消息框样式--&gt;</span><br><span class="line"></span><br><span class="line">     &lt;!--</span><br><span class="line"></span><br><span class="line">     &lt;div class=&quot;alert alert-success&quot;&gt;成功！很好地完成了提交。&lt;/div&gt;</span><br><span class="line"></span><br><span class="line">     &lt;div class=&quot;alert alert-info&quot;&gt;信息！请注意这个信息。&lt;/div&gt;</span><br><span class="line"></span><br><span class="line">     &lt;div class=&quot;alert alert-warning&quot;&gt;警告！请不要提交。&lt;/div&gt;</span><br><span class="line"></span><br><span class="line">     &lt;div class=&quot;alert alert-danger&quot;&gt;错误！请进行一些更改。&lt;/div&gt;</span><br><span class="line"></span><br><span class="line">     --&gt;</span><br><span class="line"></span><br><span class="line">     &lt;div id=&quot;msg&quot; class=&quot;showmessage&quot;&gt;</span><br><span class="line"></span><br><span class="line">     &lt;/div&gt;</span><br><span class="line"></span><br><span class="line">     &lt;!--聊天室消息框--&gt;</span><br><span class="line"></span><br><span class="line">     &lt;div class=&quot;well&quot; &gt;</span><br><span class="line"></span><br><span class="line">      &lt;form role=&quot;form&quot;&gt;</span><br><span class="line"></span><br><span class="line">       &lt;div class=&quot;form-group&quot;&gt;</span><br><span class="line"></span><br><span class="line">        &lt;label for=&quot;name&quot;&gt;发送消息&lt;/label&gt;</span><br><span class="line"></span><br><span class="line">        &lt;textarea class=&quot;form-control&quot; id=&quot;content&quot; name=&quot;content&quot;</span><br><span class="line"></span><br><span class="line">           style=&quot;resize: none;font-family: Microsoft YaHei;&quot; rows=&quot;3&quot; &gt;</span><br><span class="line"></span><br><span class="line">        &lt;/textarea&gt;</span><br><span class="line"></span><br><span class="line">       &lt;/div&gt;</span><br><span class="line"></span><br><span class="line">       &lt;div style=&quot;text-align: right&quot;&gt;</span><br><span class="line"></span><br><span class="line">        &lt;button type=&quot;button&quot; class=&quot;btn btn-primary&quot; onclick=&quot;send()&quot;&gt;</span><br><span class="line"></span><br><span class="line">         &lt;span class=&quot;glyphicon glyphicon-envelope&quot;&gt;&lt;/span&gt;</span><br><span class="line"></span><br><span class="line">         发送</span><br><span class="line"></span><br><span class="line">        &lt;/button&gt;</span><br><span class="line"></span><br><span class="line">       &lt;/div&gt;</span><br><span class="line"></span><br><span class="line">      &lt;/form&gt;</span><br><span class="line"></span><br><span class="line">     &lt;/div&gt;</span><br><span class="line"></span><br><span class="line">     &lt;!--聊天室发送框--&gt;</span><br><span class="line"></span><br><span class="line">    &lt;/div&gt;</span><br><span class="line"></span><br><span class="line">   &lt;/div&gt;</span><br><span class="line"></span><br><span class="line">  &lt;/div&gt;</span><br><span class="line"></span><br><span class="line"> &lt;/body&gt;</span><br><span class="line"></span><br><span class="line">&lt;/html&gt;</span><br></pre></td></tr></table></figure>

<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br></pre></td><td class="code"><pre><span class="line">&lt;?php</span><br><span class="line"></span><br><span class="line">/**</span><br><span class="line"></span><br><span class="line">- @功能 将表单插入数据库</span><br><span class="line"></span><br><span class="line"> */</span><br><span class="line"></span><br><span class="line">$content=$_POST[&apos;content&apos;];</span><br><span class="line"></span><br><span class="line">print_r($_POST);</span><br><span class="line"></span><br><span class="line">$time= date(&quot;Y-m-d H:i:s&quot;, time(0));</span><br><span class="line"></span><br><span class="line">$link = mysqli_connect(&apos;localhost&apos;, &apos;root&apos;, &apos;123&apos;, &apos;test&apos;);</span><br><span class="line"></span><br><span class="line">mysqli_query($link, &apos;set names utf8&apos;);</span><br><span class="line"></span><br><span class="line">$ip = $_SERVER[&quot;REMOTE_ADDR&quot;];</span><br><span class="line"></span><br><span class="line">$sql=&quot;INSERT INTO talk VALUES(NULL,&apos;匿名者&apos;,&apos;$ip&apos;,&apos;$content&apos;,&apos;$time&apos;)&quot;;</span><br><span class="line"></span><br><span class="line">$data = mysqli_query($link,$sql);</span><br><span class="line"></span><br><span class="line">echo &quot;$content&quot;;</span><br><span class="line"></span><br><span class="line">if($data)</span><br><span class="line"></span><br><span class="line"> echo &quot;1&quot;;</span><br><span class="line"></span><br><span class="line"> else</span><br><span class="line"></span><br><span class="line">  echo &quot;0&quot;;</span><br></pre></td></tr></table></figure>
